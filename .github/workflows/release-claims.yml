name: Release Claims

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-claims:
    name: Check release claims
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check release claims
        shell: pwsh
        run: ./scripts/check-release-claims.ps1
